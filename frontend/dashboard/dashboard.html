<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Smart Life Saver</title>
    <link rel="stylesheet" href="dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body data-page="dashboard">

<div class="dashboard">

    <!-- SIDEBAR -->
    <body data-page="dashboard">
    <div id="sidebar-container"></div>

    <script src="load-sidebar.js"></script>
    </body>


    <!-- MAIN CONTENT -->
    <main class="content">

        <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>

        <!-- HEADER -->
        <div class="dashboard-header">
            <div>
                <h1 id="greetingText">Welcome back, Rishabh</h1>
                <p>Your health overview for today</p>
            </div>

            <div class="header-actions">
                <span class="pill">Today</span>
                <span class="bell">🔔</span>
            </div>
        </div>

        <!-- TOP STATS -->
        <div class="stats-grid">

            <div class="card stat-card">
                <span class="icon">❤️</span>
                <p>Heart Rate</p>
                <h3>72 <span>bpm</span></h3>
                <div class="trend down">▼ 3%</div>
            </div>

            <div class="card stat-card">
                <span class="icon">🚶</span>
                <p>Steps</p>
                <h3>8,432</h3>
                <div class="progress"><span style="width:84%"></span></div>
            </div>

            <div class="card stat-card">
                <span class="icon">🔥</span>
                <p>Calories</p>
                <h3>1,847</h3>
                <div class="progress"><span style="width:74%"></span></div>
            </div>

            <div class="card stat-card">
                <span class="icon">🌙</span>
                <p>Sleep</p>
                <h3>7.5 <span>hrs</span></h3>
                <div class="progress"><span style="width:90%"></span></div>
            </div>

        </div>

        <!-- CHARTS -->
        <div class="charts-grid">

            <div class="card chart-card">
                <h3>Heart Rate Today</h3>
                <canvas id="heartChart"></canvas>
            </div>

            <div class="card chart-card">
                <h3>Weekly Steps</h3>
                <canvas id="stepsChart"></canvas>
            </div>

        </div>

        <!-- BOTTOM GRID -->
        <div class="bottom-grid">

            <div class="card">
                <h3>Sleep This Week</h3>
                <p>Average: <b>6.8 hrs</b></p>
            </div>

            <div class="card">
                <h3>Recent Activity</h3>
                <p>Morning Walk — <span class="accent">3,241 steps</span></p>
            </div>

        </div>

    </main>
</div>

<script src="load-sidebar.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
