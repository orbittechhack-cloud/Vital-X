<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Vital-X</title>
    <link rel="stylesheet" href="auth.css">
</head>

<body>
<a href="../Index.html" class="back-to-landing">Back to Home</a>

<div class="auth-wrapper">
    <div class="auth-container glass">
        <!-- Header -->
        <div class="auth-header">
            <div class="logo">⚡ Vital-X</div>
            <p>Create your account to start monitoring</p>
        </div>

        <!-- Form -->
        <form onsubmit="return validatePassword()" action="health-details.html">
            <input
                    type="text"
                    id="fullName"
                    placeholder="Full Name"
                    required
                    autocomplete="name"
            >

            <input
                    type="email"
                    id="email"
                    placeholder="Email Address"
                    required
                    autocomplete="email"
            >

            <!-- Password -->
            <div class="password-box">
                <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        required
                        autocomplete="new-password"
                >
                <span class="password-toggle" onclick="togglePassword('password')"></span>
            </div>

            <!-- Confirm Password -->
            <div class="password-box">
                <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm Password"
                        required
                        autocomplete="new-password"
                >
                <span class="password-toggle" onclick="togglePassword('confirmPassword')"></span>
            </div>

            <button type="submit">Create Account</button>
        </form>

        <p class="note">
            Already have an account?
            <a href="login.html">Sign In</a>
        </p>
    </div>
</div>

<script src="auth.js"></script>
<script>
    // Enhanced password toggle with visual feedback
    function togglePassword(id) {
        const input = document.getElementById(id);
        const toggle = input.nextElementSibling;

        if (input.type === "password") {
            input.type = "text";
            toggle.classList.add("show");
        } else {
            input.type = "password";
            toggle.classList.remove("show");
        }
    }

    // Enhanced password validation
    function validatePassword() {
        const password = document.getElementById("password");
        const confirmPassword = document.getElementById("confirmPassword");

        if (!password || !confirmPassword) return true;

        if (password.value !== confirmPassword.value) {
            alert("❌ Passwords do not match!");
            confirmPassword.focus();
            return false;
        }

        if (password.value.length < 6) {
            alert("❌ Password must be at least 6 characters long!");
            password.focus();
            return false;
        }

        return true;
    }
</script>
</body>
</html>
