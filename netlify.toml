[build]
  # Specify the directory to publish
  publish = "frontend"
  
  # No build command needed for static site
  command = ""

[[redirects]]
  from = "/*"
  to = "/Index.html"
  status = 200
  force = false
  
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
